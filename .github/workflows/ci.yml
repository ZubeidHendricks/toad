name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Smoke-test the language server (spawns the built toac lsp binary)
        run: pnpm smoke:lsp

      - name: Check the examples gallery is regenerated from the compiler
        run: node scripts/gen-examples.mjs --check

      - name: Build site (bundle compiler + VitePress)
        run: pnpm site:build
